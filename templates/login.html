{% extends 'index.html' %}
{% load static %}
{% block content %}
<!-- Premium Styles -->
<link rel="stylesheet" href="{% static 'css/premium_home.css' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 60px 20px;
    }

    .auth-card {
        max-width: 450px;
        width: 100%;
    }

    /* Dynamic Input Styles */
    .auth-card .input-group {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.6);
        display: flex;
    }

    [data-theme="dark"] .auth-card .input-group {
        background: rgba(0, 0, 0, 0.5);
        border-color: rgba(255, 255, 255, 0.1);
    }

    .auth-card .input-group:hover {
        transform: translateY(-3px) scale(1.02);
    }

    /* Distinct Colors for Inputs */
    .input-username {
        border-left: 4px solid #0d6efd !important;
        background: rgba(13, 110, 253, 0.08) !important;
    }

    .input-password {
        border-left: 4px solid #dc3545 !important;
        background: rgba(220, 53, 69, 0.08) !important;
    }

    [data-theme="dark"] .input-username {
        background: rgba(13, 110, 253, 0.15) !important;
    }

    [data-theme="dark"] .input-password {
        background: rgba(220, 53, 69, 0.15) !important;
    }

    .input-username:hover,
    .input-username:focus-within {
        border-color: #0d6efd !important;
        background: rgba(13, 110, 253, 0.15) !important;
        box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
    }

    .input-password:hover,
    .input-password:focus-within {
        border-color: #dc3545 !important;
        background: rgba(220, 53, 69, 0.15) !important;
        box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
    }

    .auth-card .form-control {
        background: transparent !important;
        border: none;
        height: auto;
        padding: 12px 15px;
        color: var(--text-color);
    }

    .auth-card .input-group-text {
        background: transparent !important;
        border: none;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card .form-control:focus {
        box-shadow: none;
        outline: none;
    }

    .input-group-text i {
        font-size: 1.1rem;
        transition: all 0.3s ease;
    }

    .input-username:focus-within i {
        color: #0d6efd !important;
        transform: scale(1.2);
    }

    .input-password:focus-within i {
        color: #dc3545 !important;
        transform: scale(1.2);
    }
</style>

<!-- Hero Background for Login -->
<img src="{% static '../media/images/premium_hero.png' %}" alt="Background" class="hero-bg">

<!-- Dark Mode Toggle -->
<button class="dark-mode-toggle" id="themeToggle" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="auth-container">
    <div class="glass-card auth-card text-center hover-lift">
        <div class="feature-icon mx-auto mb-4">
            <i class="fas fa-user-circle"></i>
        </div>
        <h2 class="font-weight-bold mb-4">Welcome Back</h2>

        {% if error %}
        <div class="alert alert-danger" style="background: rgba(220,53,69,0.1); border: 1px solid red; color: red;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="text-left">
            {% csrf_token %}
            <div class="mb-4 text-left">
                <label class="font-weight-bold">Username</label>
                <div class="input-group input-username">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    </div>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-5 text-left">
                <label class="font-weight-bold">Password</label>
                <div class="input-group input-password">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                    </div>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn-premium w-100 hover-lift mb-3">Login to RideShare</button>
        </form>

        <p class="text-muted mt-3">
            Don't have an account? <a href="{% url 'register' %}"
                class="font-weight-bold text-primary text-decoration-none">Register here</a>
        </p>
    </div>
</div>

{% include 'footer.html' %}

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const body = document.body;

        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            body.setAttribute("data-theme", savedTheme);
            updateIcon(savedTheme);
        }

        toggleBtn.addEventListener("click", () => {
            const currentTheme = body.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";

            body.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            if (theme === "dark") {
                themeIcon.classList.remove("fa-moon");
                themeIcon.classList.add("fa-sun");
            } else {
                themeIcon.classList.remove("fa-sun");
                themeIcon.classList.add("fa-moon");
            }
        }
    });
</script>
{% endblock %}
